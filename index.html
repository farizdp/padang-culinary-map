<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padang Culinary Map</title>
  <meta name="description" content="Peta kuliner Padang — rekomendasi tempat makan terbaik di Kota Padang, Sumatera Barat.">
  <meta property="og:title" content="Padang Culinary Map">
  <meta property="og:description" content="Peta kuliner Padang — rekomendasi tempat makan terbaik di Kota Padang, Sumatera Barat.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌶️</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    /* ── Variables ── */
    :root {
      --color-primary: #19350C;
      --color-accent: #687D31;
      --color-bg: #D5D3CC;
      --color-secondary: #40676B;
      --color-highlight: #6FA9BB;
      --color-ink: #19350C;
      --color-card-bg: #F2F1ED;
      --color-accent-tint: rgba(104, 125, 49, 0.12);
      --color-muted: #6b7a5e;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
      --radius: 12px;
      --shadow-sm: 0 1px 3px rgba(25, 53, 12, 0.08);
      --shadow-md: 0 4px 12px rgba(25, 53, 12, 0.12);
      --shadow-lg: 0 8px 24px rgba(25, 53, 12, 0.16);
      --transition: 0.2s ease;
      --transition-bounce: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; scroll-behavior: smooth; }
    body {
      height: 100%;
      font-family: var(--font-body);
      color: var(--color-ink);
      background: var(--color-bg);
    }

    /* ── Grain Overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* ── Split Layout ── */
    .app {
      display: flex;
      height: 100vh;
      height: 100dvh;
    }

    #map-panel {
      width: 50vw;
      height: 100vh;
      height: 100dvh;
      position: sticky;
      top: 0;
      flex-shrink: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #list-panel {
      width: 50vw;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      padding: 2rem;
      background: var(--color-bg);
    }

    /* ── Header & Disclaimer ── */
    .header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
    }

    .header h1 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(2.4rem, 5vw, 3.2rem);
      color: var(--color-primary);
      line-height: 1.1;
      letter-spacing: -0.03em;
      text-wrap: balance;
      margin-bottom: 0.5rem;
    }

    .disclaimer {
      font-size: 0.85rem;
      color: var(--color-muted);
      font-style: italic;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(25, 53, 12, 0.1);
    }

    /* ── Route Selector ── */
    #route-selector {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .route-btn {
      padding: 0.5rem 1rem;
      border: 2px solid var(--color-secondary);
      border-radius: 2rem;
      background: transparent;
      color: var(--color-primary);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all var(--transition);
    }

    .route-btn:hover {
      background: var(--color-highlight);
      color: #fff;
      border-color: var(--color-highlight);
    }

    .route-btn:active {
      transform: scale(0.97);
      transition-duration: 0.1s;
    }

    .route-btn.active {
      background: var(--color-accent);
      color: #fff;
      border-color: var(--color-accent);
    }

    .route-btn:focus-visible {
      outline: 2px solid var(--color-highlight);
      outline-offset: 2px;
    }

    /* ── Route Info ── */
    .route-info {
      background: var(--color-card-bg);
      border: 1px solid rgba(104, 125, 49, 0.2);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow-sm);
    }

    .route-info.hidden { display: none; }

    .route-info-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--color-primary);
      margin-bottom: 0.25rem;
    }

    .route-info-desc {
      font-size: 0.88rem;
      line-height: 1.4;
      margin-bottom: 0.35rem;
    }

    .route-info-time {
      font-size: 0.8rem;
      color: var(--color-secondary);
      font-weight: 600;
    }

    /* ── Category Nav ── */
    #category-nav {
      display: flex;
      gap: 0.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--color-bg);
      padding: 0.75rem 0;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid rgba(25, 53, 12, 0.1);
    }

    .cat-link {
      text-decoration: none;
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-primary);
      background: transparent;
      border: 1px solid rgba(25, 53, 12, 0.15);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .cat-link:hover,
    .cat-link.active {
      background: var(--color-accent);
      color: #fff;
    }

    .cat-link:active {
      transform: scale(0.97);
      transition-duration: 0.1s;
    }

    .cat-link:focus-visible {
      outline: 2px solid var(--color-highlight);
      outline-offset: 2px;
    }

    /* ── Category Headers ── */
    .category-header {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.6rem;
      color: var(--color-primary);
      font-style: italic;
      letter-spacing: -0.02em;
      padding: 0.75rem 0 0.5rem;
      margin-top: 1.25rem;
      margin-bottom: 1rem;
    }

    .category-header::before {
      content: '';
      display: block;
      width: 24px;
      height: 3px;
      background: var(--color-accent);
      border-radius: 2px;
      margin-bottom: 0.5rem;
    }

    .category-section:first-child .category-header {
      margin-top: 0;
    }

    /* ── Cards ── */
    @keyframes card-enter {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--color-card-bg);
      border-radius: var(--radius);
      border: 1px solid rgba(25, 53, 12, 0.06);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease, background 0.2s ease, opacity 0.3s ease, border-color 0.2s ease;
      box-shadow: var(--shadow-sm);
      animation: card-enter 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .card:active {
      transform: translateY(0) scale(0.99);
      transition-duration: 0.1s;
    }

    .card:focus-visible {
      outline: 2px solid var(--color-highlight);
      outline-offset: 2px;
    }

    .card.active {
      background: var(--color-accent-tint);
      border-color: rgba(104, 125, 49, 0.2);
      box-shadow: var(--shadow-lg);
    }

    .card.dimmed {
      opacity: 0.25;
      pointer-events: none;
      transform: scale(0.98);
    }

    .card-header {
      display: flex;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .card-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 50%;
      background: var(--color-secondary);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      margin-right: 0.5rem;
      flex-shrink: 0;
    }

    .card.active .card-number {
      background: var(--color-accent);
    }

    .card-name {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
    }

    .card-image {
      width: 100%;
      height: 120px;
      border-radius: 8px;
      overflow: hidden;
      margin: 0.5rem 0;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-description {
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--color-muted);
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--color-secondary);
    }

    .card-menu-list {
      font-size: 0.8rem;
      color: var(--color-muted);
      margin-top: 0.35rem;
    }

    /* ── Map Markers ── */
    @keyframes marker-drop {
      0% { transform: translateY(-12px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .custom-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #fff;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.75rem;
      border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(25, 53, 12, 0.3);
      transition: transform var(--transition-bounce), box-shadow 0.2s ease;
      animation: marker-drop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .custom-marker:hover,
    .custom-marker.pulse {
      transform: scale(1.25);
      box-shadow: 0 2px 8px rgba(25, 53, 12, 0.35);
    }

    /* ── Leaflet Popup Override ── */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius);
      font-family: var(--font-body);
      box-shadow: var(--shadow-md);
    }

    .leaflet-popup-content {
      margin: 0.75rem 1rem;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .leaflet-popup-content strong {
      font-weight: 700;
      display: block;
      margin-bottom: 0.15rem;
      color: var(--color-primary);
    }

    .popup-category {
      font-size: 0.8em;
      color: var(--color-accent);
      display: block;
      margin-bottom: 0.25rem;
    }

    /* ── Skip Link ── */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: var(--color-primary);
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      z-index: 10000;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .skip-link:focus {
      top: 1rem;
    }

    /* ── Error State ── */
    .error {
      text-align: center;
      padding: 2rem;
      color: var(--color-secondary);
      font-style: italic;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .app {
        flex-direction: column;
        height: auto;
      }

      #map-panel {
        width: 100%;
        height: 40vh;
        height: 40dvh;
        position: relative;
      }

      #list-panel {
        width: 100%;
        height: auto;
        overflow-y: visible;
        padding: 1.25rem;
      }

      .header h1 {
        font-size: 1.6rem;
      }

      #route-selector {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 0.25rem;
      }

      #category-nav {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 0.25rem;
      }

      .category-header {
        font-size: 1.1rem;
      }

      .card-image {
        height: 90px;
      }
    }
  </style>
</head>
<body>
  <a href="#card-list" class="skip-link">Langsung ke daftar kuliner</a>
  <div class="app">
    <div id="map-panel">
      <div id="map" aria-label="Peta kuliner Padang"></div>
    </div>
    <div id="list-panel">
      <header class="header">
        <h1>Padang Culinary Map</h1>
        <p class="disclaimer">Rekomendasi berdasarkan pengalaman pribadi. Bukan daftar resmi.</p>
      </header>
      <nav id="route-selector"></nav>
      <div id="route-info" class="route-info hidden"></div>
      <nav id="category-nav"></nav>
      <div id="card-list" role="list"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (async () => {
      const state = {
        activeId: null,
        activeRoute: null,
        markers: {},
        cards: {},
        routePolyline: null,
        categoryOrder: []
      };

      // Fetch data: CDN first, local fallback
      const CDN_URL = 'https://cdn.jsdelivr.net/gh/farizdp/web-data-store@main/padang-culinary-map/data.json';
      const LOCAL_URL = './data.json';

      let rawData = {};
      try {
        const response = await fetch(CDN_URL);
        if (!response.ok) throw new Error(`CDN ${response.status}`);
        rawData = await response.json();
      } catch (cdnError) {
        console.warn('CDN fetch failed, falling back to local:', cdnError);
        try {
          const localResponse = await fetch(LOCAL_URL);
          rawData = await localResponse.json();
        } catch (localError) {
          console.error('All data sources failed:', localError);
          document.getElementById('card-list').innerHTML =
            '<p class="error">Gagal memuat data. Silakan refresh halaman.</p>';
          return;
        }
      }

      // Handle both old flat array and new object format
      const destinations = Array.isArray(rawData) ? rawData : (rawData.destinations || []);
      const routes = Array.isArray(rawData) ? [] : (rawData.routes || []);

      // Group destinations by category
      const categoryMap = new Map();
      destinations.forEach(dest => {
        const cat = dest.category || 'Lainnya';
        if (!categoryMap.has(cat)) categoryMap.set(cat, []);
        categoryMap.get(cat).push(dest);
      });
      state.categoryOrder = [...categoryMap.keys()];

      function slugify(str) {
        return str.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      }

      // Init map centered on Padang
      const map = L.map('map', {
        zoomControl: true,
        scrollWheelZoom: true
      }).setView([-0.9471, 100.4172], 14);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      // Render markers
      destinations.forEach((dest, index) => {
        const markerIcon = L.divIcon({
          className: '',
          html: `<div class="custom-marker" style="animation-delay: ${index * 0.06}s">${index + 1}</div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14],
          popupAnchor: [0, -16]
        });

        const marker = L.marker([dest.lat, dest.lng], { icon: markerIcon }).addTo(map);

        let popupContent = `<strong>${dest.name}</strong>`;
        if (dest.category) popupContent += `<span class="popup-category">${dest.category}</span>`;
        popupContent += `<span>${dest.description}</span>`;
        if (dest.hours) popupContent += `<br><small>🕐 ${dest.hours}</small>`;

        marker.bindPopup(popupContent);
        marker.on('click', () => setActive(dest.id));
        state.markers[dest.id] = marker;
      });

      // Render category nav
      const categoryNav = document.getElementById('category-nav');
      state.categoryOrder.forEach(cat => {
        const link = document.createElement('a');
        link.className = 'cat-link';
        link.href = `#cat-${slugify(cat)}`;
        link.textContent = cat;
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.getElementById(`cat-${slugify(cat)}`);
          if (target) target.scrollIntoView({ behavior: 'smooth' });
        });
        categoryNav.appendChild(link);
      });

      // Render card list grouped by category
      const cardList = document.getElementById('card-list');
      let globalIndex = 0;

      categoryMap.forEach((dests, category) => {
        const section = document.createElement('section');
        section.className = 'category-section';
        section.id = `cat-${slugify(category)}`;
        section.dataset.category = category;

        const header = document.createElement('h2');
        header.className = 'category-header';
        header.textContent = category;
        section.appendChild(header);

        dests.forEach(dest => {
          globalIndex++;
          const card = document.createElement('article');
          card.className = 'card';
          card.setAttribute('role', 'listitem');
          card.dataset.id = dest.id;

          let imageHtml = '';
          if (dest.image) {
            imageHtml = `<div class="card-image"><img src="${dest.image}" alt="${dest.name}" loading="lazy"></div>`;
          }

          let menuHtml = '';
          if (Array.isArray(dest.menu) && dest.menu.length > 0) {
            menuHtml = `<p class="card-menu-list">${dest.menu.join(' · ')}</p>`;
          } else if (typeof dest.menu === 'string' && dest.menu) {
            menuHtml = `<p class="card-menu-list">${dest.menu}</p>`;
          }

          let hoursHtml = '';
          if (dest.hours) {
            hoursHtml = `<span class="card-hours">🕐 ${dest.hours}</span>`;
          }

          card.innerHTML = `
            <div class="card-header">
              <span class="card-number">${globalIndex}</span>
              <span class="card-name">${dest.name}</span>
            </div>
            ${imageHtml}
            <p class="card-description">${dest.description}</p>
            <div class="card-meta">${hoursHtml}</div>
            ${menuHtml}
          `;

          card.setAttribute('tabindex', '0');
          card.style.animationDelay = `${globalIndex * 0.05}s`;
          card.addEventListener('click', () => setActive(dest.id));
          card.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              setActive(dest.id);
            }
          });
          section.appendChild(card);
          state.cards[dest.id] = card;
        });

        cardList.appendChild(section);
      });

      // Render route selector
      if (routes.length > 0) {
        const routeSelector = document.getElementById('route-selector');

        const allBtn = document.createElement('button');
        allBtn.className = 'route-btn active';
        allBtn.dataset.route = 'all';
        allBtn.textContent = 'Semua';
        allBtn.addEventListener('click', () => selectRoute(null));
        routeSelector.appendChild(allBtn);

        routes.forEach(route => {
          const btn = document.createElement('button');
          btn.className = 'route-btn';
          btn.dataset.route = route.id;
          btn.textContent = route.name;
          btn.addEventListener('click', () => selectRoute(route.id));
          routeSelector.appendChild(btn);
        });
      }

      // Route selection logic
      function selectRoute(routeId) {
        document.querySelectorAll('.route-btn').forEach(btn => {
          btn.classList.toggle('active',
            (routeId === null && btn.dataset.route === 'all') ||
            btn.dataset.route === routeId
          );
        });

        // Remove existing polyline
        if (state.routePolyline) {
          map.removeLayer(state.routePolyline);
          state.routePolyline = null;
        }

        const routeInfo = document.getElementById('route-info');
        state.activeRoute = routeId;

        if (routeId === null) {
          routeInfo.classList.add('hidden');
          document.querySelectorAll('.card').forEach(c => c.classList.remove('dimmed'));
          Object.values(state.markers).forEach(m => m.setOpacity(1));
          map.setView([-0.9471, 100.4172], 14);
          return;
        }

        const route = routes.find(r => r.id === routeId);
        if (!route) return;

        // Show route info
        routeInfo.classList.remove('hidden');
        routeInfo.innerHTML = `
          <h3 class="route-info-name">${route.name}</h3>
          <p class="route-info-desc">${route.description}</p>
          <span class="route-info-time">Estimasi: ${route.estimatedTime}</span>
        `;

        const stopIds = new Set(route.stops);

        // Dim/show cards and markers
        destinations.forEach(dest => {
          const card = state.cards[dest.id];
          const marker = state.markers[dest.id];
          if (stopIds.has(dest.id)) {
            if (card) card.classList.remove('dimmed');
            if (marker) marker.setOpacity(1);
          } else {
            if (card) card.classList.add('dimmed');
            if (marker) marker.setOpacity(0.2);
          }
        });

        // Draw polyline connecting route stops
        const latlngs = route.stops
          .map(id => destinations.find(d => d.id === id))
          .filter(Boolean)
          .map(d => [d.lat, d.lng]);

        if (latlngs.length > 1) {
          const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--color-accent').trim();
          state.routePolyline = L.polyline(latlngs, {
            color: accentColor,
            weight: 4,
            opacity: 0.8,
            dashArray: '10, 8',
            smoothFactor: 1
          }).addTo(map);

          map.fitBounds(state.routePolyline.getBounds().pad(0.2));
        }
      }

      // Two-way sync between cards and markers
      function setActive(id) {
        if (state.activeId !== null) {
          const prevCard = state.cards[state.activeId];
          if (prevCard) prevCard.classList.remove('active');

          const prevMarkerEl = state.markers[state.activeId]?.getElement()?.querySelector('.custom-marker');
          if (prevMarkerEl) prevMarkerEl.classList.remove('pulse');
        }

        state.activeId = id;

        const card = state.cards[id];
        if (card) {
          card.classList.add('active');
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        const marker = state.markers[id];
        if (marker) {
          const dest = destinations.find(d => d.id === id);
          map.flyTo([dest.lat, dest.lng], 16, { duration: 0.8 });
          marker.openPopup();

          const markerEl = marker.getElement()?.querySelector('.custom-marker');
          if (markerEl) markerEl.classList.add('pulse');
        }
      }

      // Clear active state when popup closes
      map.on('popupclose', () => {
        if (state.activeId !== null) {
          const card = state.cards[state.activeId];
          if (card) card.classList.remove('active');

          const markerEl = state.markers[state.activeId]?.getElement()?.querySelector('.custom-marker');
          if (markerEl) markerEl.classList.remove('pulse');

          state.activeId = null;
        }
      });

      // Scroll spy: highlight active category in nav
      const listPanel = document.getElementById('list-panel');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const cat = entry.target.dataset.category;
            document.querySelectorAll('.cat-link').forEach(link => {
              link.classList.toggle('active', link.textContent === cat);
            });
          }
        });
      }, {
        root: listPanel,
        threshold: 0.3
      });

      document.querySelectorAll('.category-section').forEach(section => {
        observer.observe(section);
      });
    })();
  </script>
</body>
</html>
