<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peta Kuliner Padang</title>
  <meta name="description" content="Peta kuliner Padang — rekomendasi tempat makan terbaik di Kota Padang, Sumatera Barat.">
  <meta property="og:title" content="Peta Kuliner Padang">
  <meta property="og:description" content="Rekomendasi tempat makan terbaik di Kota Padang, berdasarkan pengalaman pribadi.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌶️</text></svg>">

  <!-- Google Fonts: Bricolage Grotesque + Figtree -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;600;700;800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    /* ── Design Tokens: West Sumatra Landscape ── */
    :root {
      /* Lake Maninjau teal — primary identity */
      --lake:          oklch(62% 0.13 192);
      --lake-dark:     oklch(30% 0.10 192);
      --lake-mid:      oklch(78% 0.07 192);
      --lake-light:    oklch(95.5% 0.035 192);

      /* Padang chili red — action & accent */
      --chili:         oklch(53% 0.20 26);
      --chili-mid:     oklch(80% 0.08 26);
      --chili-light:   oklch(96.5% 0.028 26);

      /* Surfaces — neutrals tinted toward lake hue */
      --bg:            oklch(98.5% 0.007 192);
      --surface:       oklch(96.5% 0.012 192);
      --surface-hi:    oklch(99.2% 0.004 192);

      /* Text */
      --ink:           oklch(22% 0.055 192);
      --muted:         oklch(55% 0.038 192);
      --subtle:        oklch(72% 0.022 192);

      /* Borders */
      --border:        oklch(90% 0.018 192);
      --border-strong: oklch(82% 0.038 192);

      /* Typography */
      --font-display:  'Bricolage Grotesque', system-ui, sans-serif;
      --font-body:     'Figtree', system-ui, sans-serif;

      /* Spacing — 4pt scale */
      --sp-1:   4px;
      --sp-2:   8px;
      --sp-3:   12px;
      --sp-4:   16px;
      --sp-6:   24px;
      --sp-8:   32px;
      --sp-12:  48px;
      --sp-16:  64px;

      /* Radius */
      --r-sm:   6px;
      --r-md:   10px;
      --r-lg:   16px;
      --r-full: 9999px;

      /* Shadows */
      --shadow-sm: 0 1px 3px oklch(22% 0.06 192 / 0.06);
      --shadow-md: 0 4px 16px oklch(22% 0.06 192 / 0.09);
      --shadow-lg: 0 10px 32px oklch(22% 0.06 192 / 0.11);

      /* Easing — expo out, no bounce */
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; scroll-behavior: smooth; }
    body {
      height: 100%;
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Film grain — adds warmth, reduces sterile "screen" feel ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* ── Split layout ── */
    .app {
      display: flex;
      height: 100vh;
      height: 100dvh;
    }

    #map-panel {
      width: 50vw;
      height: 100vh;
      height: 100dvh;
      position: sticky;
      top: 0;
      flex-shrink: 0;
    }

    #map { width: 100%; height: 100%; }

    #list-panel {
      width: 50vw;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      background: var(--bg);
      box-shadow: -5px 0 20px oklch(22% 0.06 192 / 0.05);
    }

    #list-panel::-webkit-scrollbar { width: 3px; }
    #list-panel::-webkit-scrollbar-track { background: transparent; }
    #list-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: var(--r-full);
    }

    /* ── Scroll container ── */
    .list-inner {
      padding: 0 var(--sp-8) var(--sp-12);
    }

    /* ── Header ── */
    .header {
      padding-top: var(--sp-8);
      padding-bottom: var(--sp-6);
    }

    .header-eyebrow {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-family: var(--font-body);
      font-size: 0.69rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--lake);
      margin-bottom: var(--sp-3);
    }

    .header-eyebrow::before {
      content: '';
      display: block;
      width: 18px;
      height: 1.5px;
      background: currentColor;
      border-radius: var(--r-full);
      flex-shrink: 0;
    }

    .header h1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(2.1rem, 4.5vw, 2.9rem);
      line-height: 1.02;
      letter-spacing: -0.038em;
      color: var(--ink);
      margin-bottom: var(--sp-3);
    }

    .header h1 span { color: var(--chili); }

    .header-sub {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.55;
      max-width: 40ch;
    }

    /* ── Route Selector ── */
    .route-selector-title {
      display: none;
      align-items: center;
      gap: var(--sp-2);
      font-family: var(--font-body);
      font-size: 0.69rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--lake);
      margin-bottom: var(--sp-3);
    }

    .route-selector-title.visible { display: flex; }

    .route-selector-title::before {
      content: '';
      display: block;
      width: 18px;
      height: 1.5px;
      background: currentColor;
      border-radius: var(--r-full);
      flex-shrink: 0;
    }

    #route-selector {
      display: flex;
      gap: var(--sp-2);
      flex-wrap: wrap;
      padding-bottom: var(--sp-4);
    }

    .route-btn {
      padding: var(--sp-2) var(--sp-4);
      border-radius: var(--r-full);
      border: 1.5px solid var(--border-strong);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      line-height: 1;
      transition: background 0.16s var(--ease), color 0.16s var(--ease), border-color 0.16s var(--ease), transform 0.14s var(--ease);
    }

    .route-btn:hover {
      border-color: var(--lake);
      color: var(--lake);
      background: var(--lake-light);
    }

    .route-btn.active {
      background: var(--lake);
      color: var(--surface-hi);
      border-color: var(--lake);
    }

    .route-btn:active { transform: scale(0.97); }
    .route-btn:focus-visible { outline: 2px solid var(--lake); outline-offset: 2px; }

    /* ── Route Info ── */
    .route-info {
      background: var(--lake-light);
      border: 1px solid var(--lake-mid);
      border-radius: var(--r-md);
      padding: var(--sp-3) var(--sp-4);
      margin-bottom: var(--sp-4);
    }

    .route-info.hidden { display: none; }

    .route-info-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--lake-dark);
      margin-bottom: 2px;
    }

    .route-info-desc {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: var(--sp-2);
    }

    .route-info-time {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--lake);
    }

    /* ── Category Nav — sticky filter bar ── */
    #category-nav {
      display: flex;
      gap: var(--sp-2);
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: var(--sp-3) 0 var(--sp-2);
      margin-bottom: var(--sp-3);
    }

    #category-nav::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }

    .cat-link {
      text-decoration: none;
      padding: 3px var(--sp-3);
      border-radius: var(--r-full);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
      line-height: 1.6;
      transition: background 0.15s var(--ease), color 0.15s var(--ease), border-color 0.15s var(--ease);
    }

    .cat-link:hover {
      color: var(--ink);
      border-color: var(--border-strong);
    }

    .cat-link.active {
      background: var(--chili);
      color: oklch(99% 0.01 26);
      border-color: var(--chili);
    }

    .cat-link:focus-visible { outline: 2px solid var(--lake); outline-offset: 2px; }

    /* ── Category Section ── */
    .category-section { padding-bottom: var(--sp-2); }

    .category-header {
      display: flex;
      flex-direction: column;
      gap: var(--sp-1);
      padding-top: var(--sp-12);
      padding-bottom: var(--sp-4);
    }

    .category-header-index {
      font-family: var(--font-body);
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--chili);
    }

    .category-header-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(1.55rem, 3vw, 2.05rem);
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    .category-section:first-child .category-header {
      padding-top: var(--sp-4);
    }

    /* ── Destination list items ── */
    @keyframes item-enter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      padding: var(--sp-4) var(--sp-3);
      border-top: 1px solid var(--border);
      cursor: pointer;
      outline: none;
      transition: background 0.15s var(--ease), transform 0.16s var(--ease);
      animation: item-enter 0.3s var(--ease) both;
    }

    .card:hover { background: var(--surface); }
    .card:active { transform: scale(0.999); }

    .card.active { background: var(--chili-light); }

    .card.dimmed {
      opacity: 0.18;
      pointer-events: none;
    }

    .card.hidden { display: none; }

    /* Route stop highlight */
    .card.route-stop {
      border-left: 3px solid var(--lake);
      background: var(--lake-light);
    }

    .card.route-stop:hover { background: oklch(93% 0.04 192); }

    .card.route-stop .card-number { background: var(--lake); }

    .route-stop-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--lake);
      margin-bottom: var(--sp-1);
    }

    .custom-marker.route-stop {
      background: var(--lake);
      box-shadow: 0 2px 8px oklch(62% 0.13 192 / 0.44);
    }

    .custom-marker.route-stop:hover,
    .custom-marker.route-stop.pulse {
      box-shadow: 0 4px 16px oklch(62% 0.13 192 / 0.55);
    }

    .category-section.hidden { display: none; }

    .route-stops-section { padding-bottom: var(--sp-2); }

    .card:focus-visible {
      outline: 2px solid var(--lake);
      outline-offset: -2px;
      border-radius: var(--r-sm);
    }

    /* Card row */
    .card-row {
      display: flex;
      align-items: flex-start;
      gap: var(--sp-3);
    }

    .card-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--chili);
      color: oklch(99% 0.01 26);
      font-size: 0.69rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-name {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.96rem;
      letter-spacing: -0.012em;
      color: var(--ink);
      line-height: 1.3;
    }

    .card-image {
      width: 100%;
      height: 108px;
      border-radius: var(--r-sm);
      overflow: hidden;
      margin: var(--sp-2) 0;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s var(--ease);
    }

    .card:hover .card-image img { transform: scale(1.04); }

    .card-description {
      font-size: 0.845rem;
      line-height: 1.58;
      color: var(--muted);
      margin-top: var(--sp-1);
      max-width: 52ch;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      margin-top: var(--sp-2);
      font-size: 0.75rem;
      color: var(--subtle);
      font-weight: 500;
    }

    .card-menu-list {
      font-size: 0.75rem;
      color: var(--subtle);
      margin-top: var(--sp-1);
      line-height: 1.5;
    }

    /* ── Map markers ── */
    @keyframes marker-drop {
      0%   { opacity: 0; transform: translateY(-8px) scale(0.75); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .custom-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--chili);
      color: oklch(99% 0.01 26);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.7rem;
      border: 2px solid oklch(98.5% 0.007 192);
      box-shadow: 0 2px 8px oklch(53% 0.20 26 / 0.32);
      transition: transform 0.22s var(--ease), box-shadow 0.22s var(--ease);
      animation: marker-drop 0.34s var(--ease) both;
    }

    .custom-marker:hover,
    .custom-marker.pulse {
      transform: scale(1.28);
      box-shadow: 0 4px 16px oklch(53% 0.20 26 / 0.44);
    }

    /* ── Leaflet popup overrides ── */
    .leaflet-popup-content-wrapper {
      border-radius: var(--r-md) !important;
      font-family: var(--font-body);
      box-shadow: var(--shadow-md) !important;
      background: var(--surface-hi) !important;
      border: 1px solid var(--border) !important;
    }

    .leaflet-popup-tip { background: var(--surface-hi) !important; }

    .leaflet-popup-close-button {
      color: var(--muted) !important;
      font-size: 16px !important;
      top: 6px !important;
      right: 8px !important;
    }

    .leaflet-popup-content {
      margin: 0.7rem 1rem !important;
      font-size: 0.875rem;
      line-height: 1.45;
      color: var(--ink);
    }

    .leaflet-popup-content strong {
      font-weight: 700;
      display: block;
      margin-bottom: 2px;
      color: var(--ink);
    }

    .popup-category {
      font-size: 0.74rem;
      color: var(--lake);
      font-weight: 600;
      display: block;
      margin-bottom: var(--sp-1);
    }

    /* ── Skip link ── */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: var(--lake-dark);
      color: oklch(98% 0.005 192);
      padding: var(--sp-2) var(--sp-4);
      border-radius: var(--r-md);
      z-index: 10000;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.84rem;
    }
    .skip-link:focus { top: 1rem; }

    /* ── Error state ── */
    .error {
      text-align: center;
      padding: var(--sp-8);
      color: var(--muted);
      font-style: italic;
      font-size: 0.9rem;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .app {
        flex-direction: column;
        height: auto;
      }

      #map-panel {
        width: 100%;
        height: 40vh;
        height: 40dvh;
        position: relative;
      }

      #list-panel {
        width: 100%;
        height: auto;
        overflow-y: visible;
        box-shadow: none;
      }

      .list-inner {
        padding: 0 var(--sp-4) var(--sp-8);
      }

      .header { padding-top: var(--sp-6); }
      .header h1 { font-size: 1.8rem; }

      #route-selector {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: var(--sp-2);
        -webkit-overflow-scrolling: touch;
      }

      #category-nav {
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
      }

      .category-header { padding-top: var(--sp-6); }
      .category-header-name { font-size: 1.35rem; }
      .card-image { height: 80px; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <a href="#card-list" class="skip-link">Langsung ke daftar kuliner</a>

  <div class="app">
    <div id="map-panel">
      <div id="map" aria-label="Peta kuliner Kota Padang, Sumatera Barat"></div>
    </div>

    <div id="list-panel">
      <div class="list-inner">
        <header class="header">
          <p class="header-eyebrow">Padang · Sumatera Barat</p>
          <h1>Peta <span>Kuliner</span><br>Padang</h1>
          <p class="header-sub">Rekomendasi berdasarkan pengalaman pribadi. Bukan daftar resmi.</p>
        </header>

        <h2 class="route-selector-title" id="route-selector-title">Recommendation Route</h2>
        <nav id="route-selector" aria-label="Pilih rute wisata kuliner"></nav>
        <div id="route-info" class="route-info hidden" aria-live="polite"></div>
        <nav id="category-nav" aria-label="Filter kategori makanan"></nav>
        <div id="card-list" role="list"></div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (async () => {
      const state = {
        activeId: null,
        activeRoute: null,
        markers: {},
        markerNumbers: {},
        cards: {},
        routePolyline: null,
        routeCardPositions: null,
        categoryOrder: [],
        initialBounds: null
      };

      // Fetch data: CDN first, local fallback
      const CDN_URL = 'https://cdn.jsdelivr.net/gh/farizdp/web-data-store@main/lab-fariz-id/padang-culinary-map/data.json';
      const GH_URL = 'https://raw.githubusercontent.com/farizdp/web-data-store/main/lab-fariz-id/padang-culinary-map/data.json';

      let rawData = {};
      try {
        const response = await fetch(CDN_URL);
        if (!response.ok) throw new Error(`CDN ${response.status}`);
        rawData = await response.json();
      } catch (cdnError) {
        console.warn('CDN fetch failed, falling back to local:', cdnError);
        try {
          const localResponse = await fetch(GH_URL);
          rawData = await localResponse.json();
        } catch (localError) {
          console.error('All data sources failed:', localError);
          document.getElementById('card-list').innerHTML =
            '<p class="error">Gagal memuat data. Silakan refresh halaman.</p>';
          return;
        }
      }

      // Handle both old flat array and new object format
      const destinations = Array.isArray(rawData) ? rawData : (rawData.destinations || []);
      const routes = Array.isArray(rawData) ? [] : (rawData.routes || []);

      // Group destinations by category
      const categoryMap = new Map();
      destinations.forEach(dest => {
        const cat = dest.category || 'Lainnya';
        if (!categoryMap.has(cat)) categoryMap.set(cat, []);
        categoryMap.get(cat).push(dest);
      });
      state.categoryOrder = [...categoryMap.keys()];

      function slugify(str) {
        return str.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      }

      // Compute initial bounds from destinations (centers map on actual data)
      if (destinations.length > 0) {
        state.initialBounds = L.latLngBounds(destinations.map(d => [d.lat, d.lng]));
      }

      // Init map — center computed from data, fallback to Padang city center
      const map = L.map('map', {
        zoomControl: true,
        scrollWheelZoom: true
      }).setView([-0.9471, 100.4172], 14);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      if (state.initialBounds) {
        map.fitBounds(state.initialBounds, { padding: [48, 48] });
      }

      // Render markers
      destinations.forEach((dest, index) => {
        const markerIcon = L.divIcon({
          className: '',
          html: `<div class="custom-marker" style="animation-delay:${index * 0.055}s">${index + 1}</div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14],
          popupAnchor: [0, -16]
        });

        const marker = L.marker([dest.lat, dest.lng], { icon: markerIcon }).addTo(map);

        let popupContent = `<strong>${dest.name}</strong>`;
        if (dest.category) popupContent += `<span class="popup-category">${dest.category}</span>`;
        popupContent += `<span>${dest.description}</span>`;
        if (dest.hours) popupContent += `<br><small style="color:var(--subtle)">🕐 ${dest.hours}</small>`;

        marker.bindPopup(popupContent);
        marker.on('click', () => setActive(dest.id));
        state.markers[dest.id] = marker;
        state.markerNumbers[dest.id] = index + 1;
      });

      // Render category nav
      const categoryNav = document.getElementById('category-nav');
      state.categoryOrder.forEach(cat => {
        const link = document.createElement('a');
        link.className = 'cat-link';
        link.href = `#cat-${slugify(cat)}`;
        link.textContent = cat;
        link.addEventListener('click', (e) => {
          e.preventDefault();
          document.getElementById(`cat-${slugify(cat)}`)?.scrollIntoView({ behavior: 'smooth' });
        });
        categoryNav.appendChild(link);
      });

      // Render card list grouped by category
      const cardList = document.getElementById('card-list');
      let globalIndex = 0;
      let catIndex = 0;

      categoryMap.forEach((dests, category) => {
        catIndex++;
        const section = document.createElement('section');
        section.className = 'category-section';
        section.id = `cat-${slugify(category)}`;
        section.dataset.category = category;

        const header = document.createElement('h2');
        header.className = 'category-header';
        header.innerHTML = `
          <span class="category-header-index">${String(catIndex).padStart(2, '0')}</span>
          <span class="category-header-name">${category}</span>
        `;
        section.appendChild(header);

        dests.forEach(dest => {
          globalIndex++;
          const card = document.createElement('article');
          card.className = 'card';
          card.setAttribute('role', 'listitem');
          card.setAttribute('tabindex', '0');
          card.dataset.id = dest.id;
          card.style.animationDelay = `${globalIndex * 0.04}s`;

          const imageHtml = dest.image
            ? `<div class="card-image"><img src="${dest.image}" alt="${dest.name}" loading="lazy"></div>`
            : '';

          const menuHtml = Array.isArray(dest.menu) && dest.menu.length > 0
            ? `<p class="card-menu-list">${dest.menu.join(' · ')}</p>`
            : (typeof dest.menu === 'string' && dest.menu)
              ? `<p class="card-menu-list">${dest.menu}</p>`
              : '';

          const hoursHtml = dest.hours
            ? `<div class="card-meta"><span>🕐 ${dest.hours}</span></div>`
            : '';

          card.innerHTML = `
            <div class="card-row">
              <span class="card-number" aria-hidden="true">${globalIndex}</span>
              <div class="card-body">
                <p class="card-name">${dest.name}</p>
                ${imageHtml}
                <p class="card-description">${dest.description}</p>
                ${hoursHtml}
                ${menuHtml}
              </div>
            </div>
          `;

          card.addEventListener('click', () => setActive(dest.id));
          card.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              setActive(dest.id);
            }
          });

          section.appendChild(card);
          state.cards[dest.id] = card;
        });

        cardList.appendChild(section);
      });

      // Render route selector
      if (routes.length > 0) {
        document.getElementById('route-selector-title').classList.add('visible');
        const routeSelector = document.getElementById('route-selector');

        const allBtn = document.createElement('button');
        allBtn.className = 'route-btn active';
        allBtn.dataset.route = 'all';
        allBtn.textContent = 'Semua';
        allBtn.addEventListener('click', () => selectRoute(null));
        routeSelector.appendChild(allBtn);

        routes.forEach(route => {
          const btn = document.createElement('button');
          btn.className = 'route-btn';
          btn.dataset.route = route.id;
          btn.textContent = route.name;
          btn.addEventListener('click', () => selectRoute(route.id));
          routeSelector.appendChild(btn);
        });
      }

      // Route selection logic
      function selectRoute(routeId) {
        document.querySelectorAll('.route-btn').forEach(btn => {
          btn.classList.toggle('active',
            (routeId === null && btn.dataset.route === 'all') ||
            btn.dataset.route === routeId
          );
        });

        // Remove polyline
        if (state.routePolyline) {
          map.removeLayer(state.routePolyline);
          state.routePolyline = null;
        }

        // Remove existing route-stop list section
        document.getElementById('route-stop-list')?.remove();

        // Restore cards that were moved into route-stop list
        if (state.routeCardPositions) {
          for (const [id, pos] of Object.entries(state.routeCardPositions)) {
            const card = state.cards[id];
            if (card) {
              card.classList.remove('route-stop');
              card.querySelector('.route-stop-badge')?.remove();
              if (pos.nextSibling) {
                pos.parent.insertBefore(card, pos.nextSibling);
              } else {
                pos.parent.appendChild(card);
              }
            }
          }
          state.routeCardPositions = null;
        }

        // Restore all category sections and markers
        document.querySelectorAll('.category-section').forEach(s => s.classList.remove('hidden'));
        destinations.forEach(dest => {
          const marker = state.markers[dest.id];
          if (marker) {
            marker.setOpacity(1);
            const el = marker.getElement()?.querySelector('.custom-marker');
            if (el) {
              el.classList.remove('route-stop');
              el.textContent = state.markerNumbers[dest.id];
            }
          }
        });

        const routeInfo = document.getElementById('route-info');
        state.activeRoute = routeId;

        if (routeId === null) {
          routeInfo.classList.add('hidden');
          if (state.initialBounds) {
            map.fitBounds(state.initialBounds, { padding: [48, 48] });
          } else {
            map.setView([-0.9471, 100.4172], 14);
          }
          return;
        }

        const route = routes.find(r => r.id === routeId);
        if (!route) return;

        routeInfo.classList.remove('hidden');
        routeInfo.innerHTML = `
          <p class="route-info-name">${route.name}</p>
          <p class="route-info-desc">${route.description}</p>
          <span class="route-info-time">Estimasi: ${route.estimatedTime}</span>
        `;

        const stopIds = new Set(route.stops);

        // Create a route-ordered section at top of card list
        const routeSection = document.createElement('section');
        routeSection.id = 'route-stop-list';
        routeSection.className = 'route-stops-section';
        cardList.insertBefore(routeSection, cardList.firstChild);

        // Move stop cards into route section in route order, with badge + highlight
        state.routeCardPositions = {};
        route.stops.forEach((destId, stopIndex) => {
          const card = state.cards[destId];
          if (!card) return;

          // Save original DOM position so we can restore it later
          state.routeCardPositions[destId] = {
            parent: card.parentElement,
            nextSibling: card.nextElementSibling
          };

          // Add "Stop N" badge before card name
          const badge = document.createElement('p');
          badge.className = 'route-stop-badge';
          badge.textContent = `Stop ${stopIndex + 1}`;
          card.querySelector('.card-body')?.prepend(badge);

          card.classList.add('route-stop');
          routeSection.appendChild(card);

          // Recolor and renumber marker with route-order number
          const marker = state.markers[destId];
          if (marker) {
            const el = marker.getElement()?.querySelector('.custom-marker');
            if (el) {
              el.classList.add('route-stop');
              el.textContent = stopIndex + 1;
            }
          }
        });

        // Dim markers that are not in this route
        destinations.forEach(dest => {
          if (!stopIds.has(dest.id)) {
            state.markers[dest.id]?.setOpacity(0.2);
          }
        });

        // Hide original category sections (now empty of stop cards)
        document.querySelectorAll('.category-section').forEach(s => s.classList.add('hidden'));

        // Draw polyline
        const latlngs = route.stops
          .map(id => destinations.find(d => d.id === id))
          .filter(Boolean)
          .map(d => [d.lat, d.lng]);

        if (latlngs.length > 1) {
          /* Use hex approximation of --lake for Leaflet SVG compatibility */
          state.routePolyline = L.polyline(latlngs, {
            color: '#2aadc0',
            weight: 3,
            opacity: 0.72,
            dashArray: '8, 6',
            smoothFactor: 1
          }).addTo(map);
          map.fitBounds(state.routePolyline.getBounds().pad(0.2));
        }
      }

      // Two-way sync: card ↔ marker
      function setActive(id) {
        if (state.activeId !== null) {
          state.cards[state.activeId]?.classList.remove('active');
          state.markers[state.activeId]?.getElement()
            ?.querySelector('.custom-marker')?.classList.remove('pulse');
        }

        state.activeId = id;

        const card = state.cards[id];
        if (card) {
          card.classList.add('active');
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        const marker = state.markers[id];
        if (marker) {
          const dest = destinations.find(d => d.id === id);
          map.flyTo([dest.lat, dest.lng], 16, { duration: 0.8 });
          marker.openPopup();
          marker.getElement()?.querySelector('.custom-marker')?.classList.add('pulse');
        }
      }

      // Clear active state when popup closes
      map.on('popupclose', () => {
        if (state.activeId !== null) {
          state.cards[state.activeId]?.classList.remove('active');
          state.markers[state.activeId]?.getElement()
            ?.querySelector('.custom-marker')?.classList.remove('pulse');
          state.activeId = null;
        }
      });

      // Scroll spy: highlight active category in nav
      const listPanel = document.getElementById('list-panel');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const cat = entry.target.dataset.category;
            document.querySelectorAll('.cat-link').forEach(link => {
              link.classList.toggle('active', link.textContent === cat);
            });
          }
        });
      }, { root: listPanel, threshold: 0.3 });

      document.querySelectorAll('.category-section').forEach(s => observer.observe(s));
    })();
  </script>
</body>
</html>
